<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo URL Checker — MSP Launchpad</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --bg:        #07090f;
      --surface:   #0c1018;
      --surface-2: #111820;
      --border:    #1b2538;
      --teal:      #35eded;
      --teal-dim:  #1aabab;
      --white:     #ffffff;
      --muted:     #5a7090;
      --success-bg:#042320;
      --success-fg:#35eded;
      --danger-bg: #1f0a0a;
      --danger-fg: #ff6060;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg);
      background-image:
        repeating-linear-gradient(
          -52deg,
          transparent 0px,
          transparent 72px,
          rgba(53,237,237,0.028) 72px,
          rgba(53,237,237,0.028) 74px
        );
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* Watermark — SVG logo faint behind content */
    .watermark {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(320px, 55vw, 620px);
      opacity: 0.028;
      pointer-events: none;
      user-select: none;
      z-index: 0;
      filter: blur(0.5px);
    }

    /* Top radial glow */
    .glow-top {
      position: fixed;
      top: -220px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 440px;
      background: radial-gradient(ellipse, rgba(53,237,237,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 660px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .site-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }
    .site-logo svg {
      height: 22px;
      width: auto;
    }

    .header h1 {
      font-size: clamp(1.7rem, 4vw, 2.2rem);
      font-weight: 800;
      color: #ffffff;
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    .header p {
      font-size: 0.93rem;
      color: var(--muted);
      line-height: 1.65;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid rgba(53,237,237,0.18);
      border-radius: 20px;
      padding: 40px;
      box-shadow:
        0 0 0 1px rgba(53,237,237,0.08),
        0 0 50px rgba(53,237,237,0.13),
        0 0 120px rgba(53,237,237,0.06),
        0 24px 80px rgba(0,0,0,0.55);
    }

    /* ── Form ── */
    .field { margin-bottom: 22px; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #ffffff;
      margin-bottom: 8px;
    }
    label em {
      font-style: normal;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.93rem;
      font-family: inherit;
      color: #ffffff;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    input::placeholder { color: #283040; }
    input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(53,237,237,0.12);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--teal);
      color: #07090f;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: background 0.18s, box-shadow 0.18s, transform 0.1s;
      margin-top: 4px;
    }
    .btn:hover:not(:disabled) {
      background: #55f5f5;
      box-shadow: 0 0 28px rgba(53,237,237,0.4);
    }
    .btn:active:not(:disabled) { transform: scale(0.99); }
    .btn:disabled {
      background: #0d3535;
      color: #1a5555;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 30px 0;
    }

    /* ── Log box ── */
    .log-box {
      background: #040609;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: var(--teal);
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.7;
      display: none;
      margin-top: 24px;
    }
    .log-box::-webkit-scrollbar { width: 4px; }
    .log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Results ── */
    .results { display: none; margin-top: 24px; }

    .summary {
      padding: 16px 20px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ffffff;
    }
    .summary.clean {
      background: var(--success-bg);
      border: 1px solid rgba(53,237,237,0.25);
      color: var(--teal);
    }
    .summary.leaks {
      background: var(--danger-bg);
      border: 1px solid rgba(255,96,96,0.25);
      color: var(--danger-fg);
    }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    thead th {
      background: var(--surface-2);
      text-align: left;
      padding: 10px 14px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid #0d1520;
      vertical-align: top;
      overflow-wrap: break-word;
      color: #c0d0e8;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(53,237,237,0.03); }
    code {
      background: rgba(53,237,237,0.08);
      color: var(--teal);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.73rem;
      font-family: 'Courier New', monospace;
    }

    .report-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      color: var(--teal);
      font-size: 0.83rem;
      font-weight: 600;
      text-decoration: none;
      opacity: 0.75;
      transition: opacity 0.15s;
    }
    .report-link:hover { opacity: 1; }

    /* ── Error ── */
    .error-box {
      margin-top: 20px;
      padding: 14px 18px;
      background: var(--danger-bg);
      border: 1px solid rgba(255,96,96,0.22);
      border-radius: 10px;
      color: var(--danger-fg);
      font-size: 0.87rem;
      display: none;
    }

    /* ── Inline report ── */
    .report-header { margin-bottom: 20px; }
    .report-badge {
      display: inline-block;
      padding: 3px 10px;
      background: rgba(53,237,237,0.1);
      border: 1px solid rgba(53,237,237,0.25);
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
    }
    .report-body h2 {
      font-size: 1.1rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 14px;
    }
    .report-body p {
      font-size: 0.87rem;
      color: #8899bb;
      margin-bottom: 6px;
      line-height: 1.6;
    }
    .report-body p strong { color: #ffffff; }
    .report-body br { display: block; height: 8px; content: ''; }
    .report-body .report-clean {
      margin-top: 14px;
      padding: 14px 18px;
      background: var(--success-bg);
      border: 1px solid rgba(53,237,237,0.2);
      border-radius: 10px;
      color: var(--teal);
      font-size: 0.9rem;
      font-weight: 600;
    }
    .report-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
      margin-top: 14px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .report-body thead th {
      background: var(--surface-2);
      text-align: left;
      padding: 10px 14px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
      border-bottom: 1px solid var(--border);
    }
    .report-body tbody td {
      padding: 9px 14px;
      border-bottom: 1px solid #0d1520;
      vertical-align: top;
      word-break: break-all;
      color: #c0d0e8;
    }
    .report-body tbody tr:last-child td { border-bottom: none; }
    .report-body tbody tr:hover td { background: rgba(53,237,237,0.03); }
    .report-body code {
      background: rgba(53,237,237,0.08);
      color: var(--teal);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.73rem;
      font-family: 'Courier New', monospace;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      display: none;
      margin-top: 18px;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 7px;
    }
    .progress-meta .pct {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: -0.01em;
    }
    .progress-track {
      width: 100%;
      height: 6px;
      background: rgba(53,237,237,0.07);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid rgba(53,237,237,0.1);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal-dim), var(--teal));
      border-radius: 99px;
      width: 0%;
      transition: width 0.4s ease;
      box-shadow: 0 0 10px rgba(53,237,237,0.45);
    }

    /* ── Fix button ── */
    .fix-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(53,237,237,0.08);
      border: 1px solid rgba(53,237,237,0.22);
      color: var(--teal);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.69rem;
      font-weight: 600;
      cursor: default;
      white-space: nowrap;
      letter-spacing: 0.03em;
      user-select: none;
    }

    /* ── Source badges ── */
    .src-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 20px;
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      vertical-align: middle;
      margin-left: 5px;
      white-space: nowrap;
    }
    .src-global { background: rgba(53,237,237,0.09); border: 1px solid rgba(53,237,237,0.22); color: var(--teal); }
    .src-tmpl   { background: rgba(255,180,50,0.09); border: 1px solid rgba(255,180,50,0.22); color: #ffb432; }

    /* ── Global tooltip (position:fixed — never clipped) ── */
    #globalTooltip {
      position: fixed;
      display: none;
      width: 300px;
      background: #0c1622;
      border: 1px solid rgba(53,237,237,0.3);
      border-radius: 14px;
      padding: 0;
      font-size: 0.79rem;
      color: #c0d0e8;
      line-height: 1.6;
      z-index: 9999;
      box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 0 1px rgba(53,237,237,0.06);
      pointer-events: none;
      overflow: hidden;
    }
    #globalTooltip .tt-head {
      background: rgba(53,237,237,0.08);
      border-bottom: 1px solid rgba(53,237,237,0.15);
      padding: 9px 14px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--teal);
    }
    #globalTooltip .tt-body { padding: 13px 14px 14px; }
    #globalTooltip .tt-source {
      display: inline-block;
      margin-bottom: 9px;
      background: rgba(53,237,237,0.09);
      border: 1px solid rgba(53,237,237,0.2);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--teal);
    }
    #globalTooltip p { margin-bottom: 8px; font-size: 0.78rem; }
    #globalTooltip strong { color: #fff; }
    #globalTooltip em { color: #5a7090; font-style: normal; }
    #globalTooltip .tt-steps {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    #globalTooltip ol,
    #globalTooltip ul { padding-left: 17px; margin: 5px 0 8px; }
    #globalTooltip li { margin-bottom: 3px; font-size: 0.76rem; }

    /* ── Footer ── */
    .footer {
      margin-top: 44px;
      display: flex;
      justify-content: center;
    }
    .footer svg { height: 14px; width: auto; opacity: 0.2; }
  </style>
</head>

      errorBox.style.display = 'none';
      logBox.style.display = 'none';
      logBox.textContent = '';
      progressWrap.style.display = 'none';
      progressFill.style.width = '0%';
      document.getElementById('reportSection').style.display = 'none';
      ttEl.style.display = 'none';
    });

    function normalizeUrl(raw) {
      let url = raw.trim();
      if (!url) return '';
      if (/^https?:\/\//i.test(url)) return url;
      if (url.startsWith('//')) url = url.slice(2);
      return 'https://' + url;
    }

    // ── Global tooltip via position:fixed (never clipped by overflow) ──
    document.addEventListener('mouseover', e => {
      const btn = e.target.closest('.fix-btn');
      if (!btn) return;
      const html = btn.dataset.tip;
      if (!html) return;
      ttEl.innerHTML = html;
      ttEl.style.display = 'block';
      positionTooltip(btn);
    });
    document.addEventListener('mouseout', e => {
      if (e.target.closest && e.target.closest('.fix-btn') && !(e.relatedTarget && e.relatedTarget.closest && e.relatedTarget.closest('.fix-btn'))) {
        ttEl.style.display = 'none';
      }
    });
    function positionTooltip(btn) {
      const r = btn.getBoundingClientRect();
      const w = 300;
      let left = r.right - w;
      if (left < 8) left = 8;
      if (left + w > window.innerWidth - 8) left = window.innerWidth - w - 8;
      const spaceBelow = window.innerHeight - r.bottom - 8;
      let top = spaceBelow >= 260 ? r.bottom + 8 : Math.max(8, r.top - ttEl.offsetHeight - 8);
      ttEl.style.left = left + 'px';
      ttEl.style.top  = top  + 'px';
    }

    // ── Group leaks by value+element+attribute ──
    function groupLeaks(leaks) {
      const map = new Map();
      for (const l of leaks) {
        const key = l.value + '||' + l.element + '||' + l.attribute;
        if (!map.has(key)) map.set(key, { element: l.element, attribute: l.attribute, value: l.value, pages: new Set() });
        map.get(key).pages.add(l.page);
      }
      return Array.from(map.values()).map(g => ({ ...g, pageCount: g.pages.size, pages: Array.from(g.pages) }));
    }

    function humanLabel(element, attribute) {
      const el  = (element   || '').toLowerCase();
      const att = (attribute || '').toLowerCase();
      if (att === 'href'   && el === 'a')      return 'Clickable link';
      if (att === 'src'    && el === 'img')    return 'Image source';
      if (att === 'src'    && el === 'script') return 'Script file';
      if (att === 'href'   && el === 'link')   return 'Stylesheet';
      if (att === 'srcset')                    return 'Responsive image';
      if (att === 'action')                    return 'Form submission';
      if (att.startsWith('data-'))             return 'Data attribute';
      return element + ' / ' + attribute;
    }

    function detectSource(pageCount, totalPages) {
      if (totalPages > 2 && pageCount >= totalPages * 0.6) return 'global';
      if (totalPages > 1 && pageCount >= 3)                return 'template';
      return 'single';
    }

    function buildTooltipHtml(group, totalPages) {
      const label  = humanLabel(group.element, group.attribute);
      const pc     = group.pageCount;
      const source = detectSource(pc, totalPages);

      let sourceBadge, intro, steps;

      if (source === 'global') {
        sourceBadge = '📍 Global component — Navbar or Footer';
        intro = 'This <strong>' + label.toLowerCase() + '</strong> appears on <strong>' + pc + ' of ' + totalPages + ' pages</strong> — it\'s coming from a <strong>global component</strong> that repeats on every page.';
        steps = '<div class="tt-steps"><strong>In Webflow, check:</strong><ol><li>Navbar <em>(most common)</em></li><li>Footer</li><li>CMS Template pages</li><li>Reusable Symbols</li></ol><strong>Steps to fix:</strong><ul><li>Open Webflow Designer</li><li>Click the Navbar or Footer element</li><li>Find the link or button with the staging URL</li><li>Open Link Settings → replace with the live URL</li><li>Publish the site</li></ul></div>';
      } else if (source === 'template') {
        sourceBadge = '📍 CMS Template (likely)';
        intro = 'This appears on <strong>' + pc + ' pages</strong> — it\'s likely inside a <strong>CMS Collection Template</strong> that\'s reused across multiple pages.';
        steps = '<div class="tt-steps"><strong>In Webflow, check:</strong><ol><li>CMS Collection Templates</li><li>Dynamic list components</li><li>Reusable Symbols</li></ol><strong>Steps to fix:</strong><ul><li>Open Webflow Designer</li><li>Navigate to the Collection Template page</li><li>Find the element with the staging URL</li><li>Update Link Settings to use the live URL</li></ul></div>';
      } else {
        sourceBadge = pc > 1 ? '📍 ' + pc + ' pages' : '📍 Single page';
        intro = 'This <strong>' + label.toLowerCase() + '</strong> appears on <strong>' + (pc === 1 ? 'one page' : pc + ' pages') + '</strong>.';
        steps = '<div class="tt-steps"><strong>In Webflow, fix it:</strong><ul><li>Open the page in Webflow Designer</li><li>Find the element referencing the staging URL</li><li>Open Link Settings → replace with the live URL</li><li>Publish the site</li></ul></div>';
      }

      return '<div class="tt-head">' + esc(label) + '</div>'
           + '<div class="tt-body"><div class="tt-source">' + esc(sourceBadge) + '</div>'
           + '<p>' + intro + '</p>' + steps + '</div>';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const siteUrl = normalizeUrl(siteInput.value);
      if (!siteUrl) {
        errorBox.textContent = '❌ Please enter a URL.';
        errorBox.style.display = 'block';
        return;
      }

      runBtn.disabled = true;
      runBtn.textContent = 'Scanning…';
      logBox.style.display = 'block';
      logBox.textContent = '';
      progressWrap.style.display = 'block';
      progressFill.style.width = '0%';
      progressPct.textContent = '0%';
      progressLabel.textContent = 'Starting scan…';
      results.style.display = 'none';
      errorBox.style.display = 'none';
      tableWrap.style.display = 'none';
      leakBody.innerHTML = '';
      ttEl.style.display = 'none';

      let maxTotal = 1;

      function setProgress(done, queued) {
        const total = done + queued;
        if (total > maxTotal) maxTotal = total;
        const pct = maxTotal > 0 ? Math.min(99, Math.round((done / maxTotal) * 100)) : 0;
        progressFill.style.width = pct + '%';
        progressPct.textContent = pct + '%';
        progressLabel.textContent = done + ' page' + (done !== 1 ? 's' : '') + ' scanned';
      }

      function renderResults(data) {
        results.style.display = 'block';
        if (data.leaksFound === 0) {
          summary.className = 'summary clean';
          summary.innerHTML = '<span>✅</span><span>' + data.pagesScanned + ' pages scanned — no staging leaks found.</span>';
        } else {
          const groups     = groupLeaks(data.leaks);
          const totalPages = data.pagesScanned;
          if (groups.length === 1 && groups[0].pageCount > 1) {
            summary.innerHTML = '<span>⚠️</span><span>1 unique issue affecting <strong>' + groups[0].pageCount + ' pages</strong> — likely a global component.</span>';
          } else {
            summary.innerHTML = '<span>⚠️</span><span>' + groups.length + ' unique issue' + (groups.length > 1 ? 's' : '') + ' found across ' + totalPages + ' pages.</span>';
          }
          summary.className = 'summary leaks';
          tableWrap.style.display = 'block';
          for (const g of groups) {
            const source = detectSource(g.pageCount, totalPages);
            const badge  = source === 'global'   ? '<span class="src-badge src-global">Global component</span>'
                         : source === 'template' ? '<span class="src-badge src-tmpl">CMS Template</span>'
                         : '';
            const tipHtml = buildTooltipHtml(g, totalPages);
            const tr = document.createElement('tr');
            tr.innerHTML =
              '<td>' + esc(humanLabel(g.element, g.attribute)) + '</td>' +
              '<td><code>' + esc(g.value.length > 55 ? g.value.slice(0, 52) + '…' : g.value) + '</code></td>' +
              '<td>' + g.pageCount + ' page' + (g.pageCount > 1 ? 's' : '') + badge + '</td>' +
              '<td style="white-space:nowrap"><span class="fix-btn" data-tip="' + esc(tipHtml) + '">How to fix ▾</span></td>';
            leakBody.appendChild(tr);
          }
        }
      }

      function handleEvent(data) {
        if (data.type === 'log') {
          logBox.textContent += '> ' + data.msg + '\n';
          logBox.scrollTop = logBox.scrollHeight;
        } else if (data.type === 'page') {
          if (data.leaked) { logBox.textContent += '  ⚠️  ' + data.leaked + ' leak(s)\n'; logBox.scrollTop = logBox.scrollHeight; }
          setProgress(data.done, data.queued);
        } else if (data.type === 'skip') {
          logBox.textContent += '  → skipped\n';
          logBox.scrollTop = logBox.scrollHeight;
          setProgress(data.done, data.queued);
        } else if (data.type === 'done') {
          progressFill.style.width = '100%';
          progressPct.textContent = '100%';
          progressLabel.textContent = data.pagesScanned + ' page' + (data.pagesScanned !== 1 ? 's' : '') + ' scanned — done';
          renderResults(data);
        } else if (data.type === 'error') {
          errorBox.textContent = '❌ ' + (data.error || 'Scan failed.');
          errorBox.style.display = 'block';
        }
      }

      try {
        const res = await fetch('/scan-stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ siteUrl }),
        });
        if (!res.ok) {
          errorBox.textContent = '❌ Server error. Please try again.';
          errorBox.style.display = 'block';
          return;
        }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const chunks = buffer.split('\n\n');
          buffer = chunks.pop();
          for (const chunk of chunks) {
            const line = chunk.trim();
            if (!line.startsWith('data: ')) continue;
            try { handleEvent(JSON.parse(line.slice(6))); } catch {}
          }
        }
      } catch (err) {
        errorBox.textContent = '❌ Network error: ' + err.message;
        errorBox.style.display = 'block';
      } finally {
        runBtn.disabled = false;
        runBtn.textContent = 'Run scan';
      }
    });

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Inline report ──
    document.getElementById('reportLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const section = document.getElementById('reportSection');
      const content = document.getElementById('reportContent');
      try {
        const res = await fetch('/report');
        if (!res.ok) { content.innerHTML = '<p style="color:var(--danger-fg)">No report yet — run a scan first.</p>'; section.style.display = 'block'; return; }
        const md = await res.text();
        content.innerHTML = renderMd(md);
        section.style.display = 'block';
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (err) {
        content.innerHTML = '<p style="color:var(--danger-fg)">Could not load report: ' + esc(err.message) + '</p>';
        section.style.display = 'block';
      }
    });

    function renderMd(md) {
      const lines = md.split('\n');
      let html = '', inTable = false, pastSeparator = false;
      for (const line of lines) {
        if (line.startsWith('# ')) {
          html += '<h2>' + esc(line.slice(2)) + '</h2>';
        } else if (/^\|[-\s|]+\|$/.test(line)) {
          html += '</thead><tbody>'; pastSeparator = true;
        } else if (line.startsWith('|')) {
          if (!inTable) { html += '<table><thead>'; inTable = true; pastSeparator = false; }
          const cells = line.split('|').slice(1, -1).map(c => c.trim());
          const tag = pastSeparator ? 'td' : 'th';
          html += '<tr>' + cells.map(c => '<' + tag + '>' + inlineFormat(c) + '</' + tag + '>').join('') + '</tr>';
        } else {
          if (inTable) { html += '</tbody></table>'; inTable = false; }
          if (line.trim() === '') html += '<br>';
          else if (line.trim().startsWith('✅') && !line.includes('|')) html += '<div class="report-clean">' + esc(line.trim()) + '</div>';
          else html += '<p>' + inlineFormat(line) + '</p>';
        }
      }
      if (inTable) html += '</tbody></table>';
      return html;
    }

    function inlineFormat(s) {
      return esc(s).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/`(.*?)`/g, '<code>$1</code>');
    }
  </script>
</body>
</html>
